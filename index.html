
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor de Precio Airbnb</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="mb-4 text-center">Predicción de Precio Airbnb</h1>
                
                <form action="/predict" method="POST" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="bathrooms" class="form-label">Baños</label>
                        <input type="number" step="0.1" id="bathrooms" name="bathrooms" class="form-control" required>
                        <div class="invalid-feedback">Por favor, ingresa el número de baños.</div>
                    </div>

                    <div class="mb-3">
                        <label for="bedrooms" class="form-label">Dormitorios</label>
                        <input type="number" id="bedrooms" name="bedrooms" class="form-control" required>
                        <div class="invalid-feedback">Por favor, ingresa el número de dormitorios.</div>
                    </div>

                    <div class="mb-3">
                        <label for="accommodates" class="form-label">Capacidad (personas)</label>
                        <input type="number" id="accommodates" name="accommodates" class="form-control" required>
                        <div class="invalid-feedback">Por favor, ingresa la capacidad.</div>
                    </div>

                    <div class="mb-3">
                        <label for="room_type" class="form-label">Tipo de habitación</label>
                        <select id="room_type" name="room_type" class="form-select" required>
                            <option value="">Selecciona una opción</option>
                            <option value="entire">Entire</option>
                            <option value="private">Private</option>
                            <option value="shared">Shared</option>
                            <option value="hotel">Hotel</option>
                        </select>
                        <div class="invalid-feedback">Por favor, selecciona un tipo de habitación.</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Predecir Precio</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        });
    </script>
</body>
</html>
